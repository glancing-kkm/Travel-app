    // ============================================================
    // Fuzzy matching (Levenshtein distance)
    // ============================================================
    function levenshtein(a, b) {
      const m = a.length, n = b.length;
      if (m === 0) return n;
      if (n === 0) return m;
      const dp = Array.from({length: m + 1}, () => Array(n + 1).fill(0));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          dp[i][j] = a[i-1] === b[j-1]
            ? dp[i-1][j-1]
            : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
        }
      }
      return dp[m][n];
    }

    function searchDestinations(query) {
      if (!query || query.trim() === '') return [];
      const q = query.toLowerCase().trim();

      const scored = destinations.map(dest => {
        const fields = [
          dest.name.toLowerCase(),
          dest.nameEn.toLowerCase(),
          dest.country.toLowerCase(),
          dest.countryEn.toLowerCase(),
          ...dest.aliases.map(a => a.toLowerCase())
        ];

        let bestScore = Infinity;

        for (const field of fields) {
          // Exact match
          if (field === q) { bestScore = 0; break; }
          // Starts with
          if (field.startsWith(q)) { bestScore = Math.min(bestScore, 1); continue; }
          // Contains
          if (field.includes(q)) { bestScore = Math.min(bestScore, 2); continue; }
          // Query contains field
          if (q.includes(field)) { bestScore = Math.min(bestScore, 3); continue; }
          // Fuzzy: Levenshtein distance relative to length
          const dist = levenshtein(q, field);
          const threshold = Math.max(q.length, field.length) * 0.45;
          if (dist <= threshold) {
            bestScore = Math.min(bestScore, 4 + dist / Math.max(q.length, field.length));
          }
        }

        return { dest, score: bestScore };
      });

      return scored
        .filter(s => s.score < Infinity)
        .sort((a, b) => a.score - b.score)
        .map(s => s.dest);
    }

    function renderInitialCards() {
      const initial = destinations.slice(0, 6);
      cardsContainer.innerHTML = initial.map(createCardHTML).join('');
    }

    // Show suggestions while typing
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim();
      if (q.length === 0) {
        suggestionsEl.classList.add('hidden');
        return;
      }
      const results = searchDestinations(q).slice(0, 5);
      if (results.length === 0) {
        suggestionsEl.innerHTML = `
          <div class="px-4 py-3 text-sm text-outline text-center">검색 결과가 없습니다</div>`;
      } else {
        suggestionsEl.innerHTML = results.map(createSuggestionHTML).join('');
      }
      suggestionsEl.classList.remove('hidden');

      // Attach click events to suggestions
      suggestionsEl.querySelectorAll('.suggestion-item').forEach(item => {
        item.addEventListener('click', () => {
          searchInput.value = item.dataset.name;
          suggestionsEl.classList.add('hidden');
          performSearch(item.dataset.name);
        });
      });
    });

    // Close suggestions on outside click
    document.addEventListener('click', (e) => {
      if (!document.getElementById('search-container').contains(e.target)) {
        suggestionsEl.classList.add('hidden');
      }
    });

    // Perform search
    function performSearch(query) {
      const results = searchDestinations(query);
      if (results.length === 0) {
        resultsTitle.textContent = `"${query}" 검색 결과 없음`;
        resultsContainer.innerHTML = `
          <div class="text-center py-12">
            <span class="material-symbols-outlined text-6xl text-outline/30 mb-4 block">travel_explore</span>
            <p class="text-outline text-sm">검색 결과가 없습니다. 다른 키워드로 검색해 보세요.</p>
          </div>`;
      } else {
        resultsTitle.textContent = `"${query}" 검색 결과 (${results.length})`;
        resultsContainer.innerHTML = results.map(createResultCardHTML).join('');
      }
      searchResults.classList.remove('hidden');
      destinationsSection.classList.add('hidden');
      suggestionsEl.classList.add('hidden');
    }

    searchBtn.addEventListener('click', () => {
      if (searchInput.value.trim()) performSearch(searchInput.value.trim());
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && searchInput.value.trim()) {
        performSearch(searchInput.value.trim());
      }
    });

    // Back to all
    backBtn.addEventListener('click', () => {
      searchResults.classList.add('hidden');
      destinationsSection.classList.remove('hidden');
      searchInput.value = '';
    });

    // Init
    renderInitialCards();
  </script>
</body>
</html>
