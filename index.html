    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

      letter-spacing: normal; word-wrap: normal; white-space: nowrap; direction: ltr;
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

</head>

<script>
// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════
const LANGUAGES = [
  { code: 'ko', label: '한국어',  flag: '🇰🇷', nominatim: 'ko' },
  { code: 'en', label: 'English', flag: '🇺🇸', nominatim: 'en' },

// UI text translations
const UI_TEXT = {

  en: { title:'Popular Destinations', category:'Experience Categories', food:'Food Tour', hike:'Hiking', photo:'Photo Spots', beach:'Beach Resort', placeholder:'Search cities or places...', seeAll:'See All', home:'Home', explore:'Explore', trip:'Trips', profile:'Profile', noResult:'No results', loading:'Searching...' },
  ja: { title:'人気の旅行先', category:'体験カテゴリ', food:'グルメ巡り', hike:'ハイキング', photo:'撮影スポット', beach:'ビーチリゾート', placeholder:'都市や場所を検索...', seeAll:'すべて見る', home:'ホーム', explore:'探索', trip:'旅行', profile:'プロフィール', noResult:'結果なし', loading:'検索中...' },
  zh: { title:'热门目的地', category:'体验类别', food:'美食探索', hike:'徒步旅行', photo:'摄影胜地', beach:'海滩度假', placeholder:'搜索城市或地点...', seeAll:'查看全部', home:'首页', explore:'探索', trip:'旅行', profile:'个人', noResult:'无结果', loading:'搜索中...' },
  fr: { title:'Destinations populaires', category:'Catégories', food:'Gastronomie', hike:'Randonnée', photo:'Photos', beach:'Plage', placeholder:'Rechercher une ville...', seeAll:'Tout voir', home:'Accueil', explore:'Explorer', trip:'Voyage', profile:'Profil', noResult:'Aucun résultat', loading:'Recherche...' },
  es: { title:'Destinos populares', category:'Categorías', food:'Gastronomía', hike:'Senderismo', photo:'Fotos', beach:'Playa', placeholder:'Buscar ciudad o lugar...', seeAll:'Ver todo', home:'Inicio', explore:'Explorar', trip:'Viaje', profile:'Perfil', noResult:'Sin resultados', loading:'Buscando...' },
  de: { title:'Beliebte Reiseziele', category:'Kategorien', food:'Kulinarik', hike:'Wandern', photo:'Fotospots', beach:'Strand', placeholder:'Stadt oder Ort suchen...', seeAll:'Alle sehen', home:'Start', explore:'Erkunden', trip:'Reise', profile:'Profil', noResult:'Keine Ergebnisse', loading:'Suche...' },
  ru: { title:'Популярные направления', category:'Категории', food:'Гастрономия', hike:'Пешие прогулки', photo:'Фототочки', beach:'Пляж', placeholder:'Поиск города или места...', seeAll:'Все', home:'Главная', explore:'Обзор', trip:'Поездка', profile:'Профиль', noResult:'Нет результатов', loading:'Поиск...' },
};

// ═══════════════════════════════════════════════
// 2. Destination data
// ═══════════════════════════════════════════════
const DESTINATIONS = [
  { id:1,  name:{ko:'도쿄',en:'Tokyo',ja:'東京',zh:'东京',fr:'Tokyo',es:'Tokio',de:'Tokio',ru:'Токио'}, country:{ko:'일본',en:'Japan',ja:'日本',zh:'日本',fr:'Japon',es:'Japón',de:'Japan',ru:'Япония'}, price:'₩ 650,000~', img:'https://images.unsplash.com/photo-1536098561742-ca998e48cbcc?w=600', lat:35.6762, lng:139.6503 },
  { id:2,  name:{ko:'파리',en:'Paris',ja:'パリ',zh:'巴黎',fr:'Paris',es:'París',de:'Paris',ru:'Париж'}, country:{ko:'프랑스',en:'France',ja:'フランス',zh:'法国',fr:'France',es:'Francia',de:'Frankreich',ru:'Франция'}, price:'₩ 1,200,000~', img:'https://images.unsplash.com/photo-1499856871958-5b9627545d1a?w=600', lat:48.8566, lng:2.3522 },
  { id:3,  name:{ko:'발리',en:'Bali',ja:'バリ',zh:'巴厘岛',fr:'Bali',es:'Bali',de:'Bali',ru:'Бали'}, country:{ko:'인도네시아',en:'Indonesia',ja:'インドネシア',zh:'印度尼西亚',fr:'Indonésie',es:'Indonesia',de:'Indonesien',ru:'Индонезия'}, price:'₩ 780,000~', img:'https://images.unsplash.com/photo-1555993539-1732b0258235?w=600', lat:-8.4095, lng:115.1889 },
  { id:4,  name:{ko:'두바이',en:'Dubai',ja:'ドバイ',zh:'迪拜',fr:'Dubaï',es:'Dubái',de:'Dubai',ru:'Дубай'}, country:{ko:'UAE',en:'UAE',ja:'UAE',zh:'阿联酋',fr:'ÉAU',es:'EAU',de:'VAE',ru:'ОАЭ'}, price:'₩ 1,050,000~', img:'https://images.unsplash.com/photo-1518684079-3c830dcef090?w=600', lat:25.2048, lng:55.2708 },
  { id:5,  name:{ko:'뉴욕',en:'New York',ja:'ニューヨーク',zh:'纽约',fr:'New York',es:'Nueva York',de:'New York',ru:'Нью-Йорк'}, country:{ko:'미국',en:'USA',ja:'アメリカ',zh:'美国',fr:'États-Unis',es:'EE.UU.',de:'USA',ru:'США'}, price:'₩ 1,350,000~', img:'https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?w=600', lat:40.7128, lng:-74.0060 },
  { id:6,  name:{ko:'런던',en:'London',ja:'ロンドン',zh:'伦敦',fr:'Londres',es:'Londres',de:'London',ru:'Лондон'}, country:{ko:'영국',en:'UK',ja:'イギリス',zh:'英国',fr:'Royaume-Uni',es:'Reino Unido',de:'Großbritannien',ru:'Великобритания'}, price:'₩ 1,100,000~', img:'https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=600', lat:51.5074, lng:-0.1278 },
];

// Fuzzy search aliases (multilingual)
const ALIASES = {
  1: ['东京','とうきょう','토쿄','동경','tokio','toquio'],
  2: ['パリ','빠리','pari','parigi','париж'],
  3: ['バリ','바리','bali island'],
  4: ['迪拜','ドバイ','두바히','dubay','дубай'],
  5: ['纽约','ニューヨーク','뉴요크','nueva york','нью-йорк'],
  6: ['伦敦','ロンドン','론던','londres','лондон'],
};

// ═══════════════════════════════════════════════
// 3. State
// ═══════════════════════════════════════════════
let currentLang = 'ko';
let map = null;
let currentPopup = null;
let searchDebounce = null;

// ═══════════════════════════════════════════════
// 4. MapLibre GL JS map init
// ═══════════════════════════════════════════════
function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: [126.9780, 37.5665], // Seoul default
    zoom: 4,
    attributionControl: false,
  });

  map.on('load', () => {
    setMapLanguage('ko');
    renderCards();
    addDestinationMarkers();
  });

  // Zoom buttons
  document.getElementById('zoom-in').addEventListener('click', () => map.zoomIn({ duration: 250 }));
  document.getElementById('zoom-out').addEventListener('click', () => map.zoomOut({ duration: 250 }));
}

// ═══════════════════════════════════════════════
// 5. Language switching
// ═══════════════════════════════════════════════
function setMapLanguage(langCode) {
  if (!map || !map.isStyleLoaded()) return;
  const style = map.getStyle();
  if (!style) return;

  style.layers.forEach(layer => {
    if (!layer.layout || !layer.layout['text-field']) return;
    try {
      map.setLayoutProperty(layer.id, 'text-field', [
        'coalesce',
        ['get', `name:${langCode}`],
        ['get', 'name'],
      ]);
    } catch (e) { /* some layers may not support this */ }
  });
}

function applyLanguage(langCode) {
  currentLang = langCode;
  const lang = LANGUAGES.find(l => l.code === langCode);
  const t = UI_TEXT[langCode];

  // Update nav badge & header label
  document.getElementById('lang-label').textContent = lang.label;
  document.getElementById('map-lang-badge').textContent = lang.label;

  // Update UI text
  document.getElementById('section-title').textContent = t.title;
  document.getElementById('category-title').textContent = t.category;
  document.getElementById('cat-food').textContent = t.food;
  document.getElementById('cat-hike').textContent = t.hike;
  document.getElementById('cat-photo').textContent = t.photo;
  document.getElementById('cat-beach').textContent = t.beach;
  document.getElementById('see-all-btn').textContent = t.seeAll;
  document.getElementById('search-input').placeholder = t.placeholder;
  document.getElementById('nav-home').textContent = t.home;
  document.getElementById('nav-explore').textContent = t.explore;
  document.getElementById('nav-trip').textContent = t.trip;
  document.getElementById('nav-profile').textContent = t.profile;

  // Highlight active language in panel
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.code === langCode);
  });

  // Update map labels
  if (map && map.isStyleLoaded()) setMapLanguage(langCode);

  // Re-render destination cards
  renderCards();
  hideLangPanel();
}

// ═══════════════════════════════════════════════
// 6. Language panel
// ═══════════════════════════════════════════════
function buildLangPanel() {
  const list = document.getElementById('lang-list');
  list.innerHTML = LANGUAGES.map(l => `
    <button class="lang-btn w-full flex items-center gap-3 px-4 py-2.5 hover:bg-surface-container-low transition-colors text-left text-sm font-medium ${l.code === currentLang ? 'active' : ''}"
      data-code="${l.code}">
      <span class="text-lg">${l.flag}</span>
      <span>${l.label}</span>
    </button>
  `).join('');
  list.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => applyLanguage(btn.dataset.code));
  });
}

function hideLangPanel() {
  document.getElementById('lang-panel').classList.add('hidden');
}

document.getElementById('lang-toggle-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  const panel = document.getElementById('lang-panel');
  panel.classList.toggle('hidden');
  if (!panel.classList.contains('hidden')) panel.classList.add('anim-in');
});

document.addEventListener('click', (e) => {
  if (!document.getElementById('lang-panel').contains(e.target) &&
      e.target !== document.getElementById('lang-toggle-btn')) {
    hideLangPanel();
  }
});

// ═══════════════════════════════════════════════
// 7. Destination cards
// ═══════════════════════════════════════════════
function renderCards() {
  const container = document.getElementById('cards-container');
  container.innerHTML = DESTINATIONS.map(d => `
    <div class="flex-none w-[220px] group cursor-pointer anim-in" onclick="flyToDestination(${d.id})">
      <div class="relative aspect-[3/4] rounded-[2rem] overflow-hidden shadow-lg">
        <img alt="${d.name[currentLang]}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" src="${d.img}"/>
        <div class="absolute top-3 right-3 bg-white/20 backdrop-blur-xl p-1.5 rounded-full text-white">
          <span class="material-symbols-outlined" style="font-size:18px;">favorite</span>
        </div>
        <div class="absolute inset-x-0 bottom-0 p-4 bg-gradient-to-t from-black/70 to-transparent">
          <p class="text-[10px] text-white/70 font-bold uppercase tracking-widest">${d.country[currentLang]}</p>
          <h4 class="font-bold text-white text-base">${d.name[currentLang]}</h4>
          <span class="text-white/90 text-xs font-semibold">${d.price}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function flyToDestination(id) {
  const d = DESTINATIONS.find(x => x.id === id);
  if (!d || !map) return;
  map.flyTo({ center: [d.lng, d.lat], zoom: 11, duration: 1800, essential: true });
  showPopup(d.lng, d.lat, d.name[currentLang], d.country[currentLang]);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════
// 8. Destination markers on map
// ═══════════════════════════════════════════════
function addDestinationMarkers() {
  DESTINATIONS.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cursor-pointer';
    el.innerHTML = `
      <div class="bg-primary text-white px-2 py-1 rounded-lg text-xs font-bold shadow-lg hover:scale-110 transition-transform whitespace-nowrap" style="font-family:Inter,sans-serif;">
        ✈ ${d.name[currentLang]}
      </div>`;

    const marker = new maplibregl.Marker({ element: el, anchor: 'bottom' })
      .setLngLat([d.lng, d.lat])
      .addTo(map);

    el.addEventListener('click', () => flyToDestination(d.id));
  });
}

// ═══════════════════════════════════════════════
// 9. Popup
// ═══════════════════════════════════════════════
function showPopup(lng, lat, name, country) {
  if (currentPopup) currentPopup.remove();
  currentPopup = new maplibregl.Popup({ closeButton: true, offset: 12 })
    .setLngLat([lng, lat])
    .setHTML(`
      <div style="font-family:Inter,sans-serif;">
        <p style="font-size:10px;color:#797a84;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 2px;">${country}</p>
        <p style="font-size:16px;font-weight:800;color:#0f57d0;margin:0;">${name}</p>
      </div>`)
    .addTo(map);
}

// ═══════════════════════════════════════════════
// 10. Levenshtein fuzzy search (for local data)
// ═══════════════════════════════════════════════
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, (_,i) => Array.from({length:n+1}, (_,j) => i===0?j:j===0?i:0));
  for (let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function localSearch(q) {
  const lq = q.toLowerCase().trim();
  return DESTINATIONS.map(d => {
    const fields = [
      ...Object.values(d.name).map(v=>v.toLowerCase()),
      ...Object.values(d.country).map(v=>v.toLowerCase()),
      ...(ALIASES[d.id]||[]).map(v=>v.toLowerCase()),
    ];
    let best = Infinity;
    for (const f of fields) {
      if (f===lq) { best=0; break; }
      if (f.startsWith(lq)||lq.startsWith(f)) { best=Math.min(best,1); continue; }
      if (f.includes(lq)||lq.includes(f)) { best=Math.min(best,2); continue; }
      const d2 = levenshtein(lq,f);
      if (d2 <= Math.max(lq.length,f.length)*0.45) best=Math.min(best,4+d2/Math.max(lq.length,f.length));
    }
    return { dest:d, score:best };
  }).filter(x=>x.score<Infinity).sort((a,b)=>a.score-b.score).map(x=>x.dest);
}

// ═══════════════════════════════════════════════
// 11. Nominatim geocoding search
// ═══════════════════════════════════════════════
async function nominatimSearch(q) {
  const lang = LANGUAGES.find(l=>l.code===currentLang)?.nominatim || 'en';
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&accept-language=${lang}&addressdetails=1`;
  try {
    const res = await fetch(url, { headers: { 'Accept-Language': lang } });
    return await res.json();
  } catch { return []; }
}

// ═══════════════════════════════════════════════
// 12. Search UI
// ═══════════════════════════════════════════════
const searchInput = document.getElementById('search-input');
const suggestionsEl = document.getElementById('suggestions');
const clearBtn = document.getElementById('clear-btn');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  clearBtn.classList.toggle('hidden', q.length === 0);
  if (q.length === 0) { suggestionsEl.classList.add('hidden'); return; }
  clearTimeout(searchDebounce);
  // Show local results immediately
  const localResults = localSearch(q);
  renderSuggestions(localResults.map(d => ({
    display: d.name[currentLang],
    sub: d.country[currentLang],
    lat: d.lat, lng: d.lng,
    isLocal: true,
  })), UI_TEXT[currentLang].loading);

  // Then enrich with Nominatim
  searchDebounce = setTimeout(async () => {
    const geoResults = await nominatimSearch(q);
    const items = geoResults.map(r => ({
      display: r.display_name.split(',')[0],
      sub: r.display_name.split(',').slice(1,3).join(',').trim(),
      lat: parseFloat(r.lat),
      lng: parseFloat(r.lon),
      isLocal: false,
    }));
    // Merge: local first, then geo (deduplicate by proximity)
    const merged = [...localResults.map(d => ({
      display: d.name[currentLang], sub: d.country[currentLang],
      lat: d.lat, lng: d.lng, isLocal: true,
    }))];
    items.forEach(item => {
      const dupe = merged.some(m => Math.abs(m.lat-item.lat)<0.5 && Math.abs(m.lng-item.lng)<0.5);
      if (!dupe) merged.push(item);
    });
    renderSuggestions(merged.slice(0,8), null);
  }, 400);
});

function renderSuggestions(items, loadingMsg) {
  if (items.length === 0 && !loadingMsg) {
    suggestionsEl.innerHTML = `<div class="px-4 py-3 text-sm text-outline text-center">${UI_TEXT[currentLang].noResult}</div>`;
    suggestionsEl.classList.remove('hidden');
    return;
  }
  let html = items.map((item, i) => `
    <div class="search-result-item flex items-center gap-3 px-4 py-3 cursor-pointer transition-colors border-b border-outline-variant/5 last:border-0"
         data-lat="${item.lat}" data-lng="${item.lng}" data-name="${item.display}">
      <span class="material-symbols-outlined text-primary shrink-0" style="font-size:18px;">${item.isLocal ? 'travel_explore' : 'location_on'}</span>
      <div class="flex-1 min-w-0">
        <p class="font-semibold text-on-surface text-sm truncate">${item.display}</p>
        ${item.sub ? `<p class="text-xs text-outline truncate">${item.sub}</p>` : ''}
      </div>
    </div>`).join('');
  if (loadingMsg) html += `<div class="px-4 py-2 text-xs text-outline text-center">${loadingMsg}</div>`;
  suggestionsEl.innerHTML = html;
  suggestionsEl.classList.remove('hidden');
  suggestionsEl.classList.add('anim-in');

  suggestionsEl.querySelectorAll('.search-result-item').forEach(el => {
    el.addEventListener('click', () => {
      const lat = parseFloat(el.dataset.lat);
      const lng = parseFloat(el.dataset.lng);
      const name = el.dataset.name;
      map.flyTo({ center: [lng, lat], zoom: 12, duration: 1800, essential: true });
      showPopup(lng, lat, name, '');
      searchInput.value = name;
      suggestionsEl.classList.add('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.classList.add('hidden');
  suggestionsEl.classList.add('hidden');
  searchInput.focus();
});

document.addEventListener('click', (e) => {
  if (!document.getElementById('search-container').contains(e.target))
    suggestionsEl.classList.add('hidden');
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') suggestionsEl.classList.add('hidden');
});

// ═══════════════════════════════════════════════
// 13. Init
// ═══════════════════════════════════════════════
buildLangPanel();
initMap();
</script>
